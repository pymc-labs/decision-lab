<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="pathGood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="pathFade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b949e;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#8b949e;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="url(#bg)" rx="12"/>

  <!-- Grid dots -->
  <g fill="#21262d" opacity="0.5">
    <circle cx="50" cy="50" r="1"/><circle cx="100" cy="50" r="1"/><circle cx="150" cy="50" r="1"/><circle cx="200" cy="50" r="1"/><circle cx="250" cy="50" r="1"/><circle cx="300" cy="50" r="1"/><circle cx="350" cy="50" r="1"/><circle cx="400" cy="50" r="1"/><circle cx="450" cy="50" r="1"/><circle cx="500" cy="50" r="1"/><circle cx="550" cy="50" r="1"/><circle cx="600" cy="50" r="1"/><circle cx="650" cy="50" r="1"/><circle cx="700" cy="50" r="1"/><circle cx="750" cy="50" r="1"/><circle cx="800" cy="50" r="1"/><circle cx="850" cy="50" r="1"/>
    <circle cx="50" cy="100" r="1"/><circle cx="100" cy="100" r="1"/><circle cx="150" cy="100" r="1"/><circle cx="200" cy="100" r="1"/><circle cx="250" cy="100" r="1"/><circle cx="300" cy="100" r="1"/><circle cx="350" cy="100" r="1"/><circle cx="400" cy="100" r="1"/><circle cx="450" cy="100" r="1"/><circle cx="500" cy="100" r="1"/><circle cx="550" cy="100" r="1"/><circle cx="600" cy="100" r="1"/><circle cx="650" cy="100" r="1"/><circle cx="700" cy="100" r="1"/><circle cx="750" cy="100" r="1"/><circle cx="800" cy="100" r="1"/><circle cx="850" cy="100" r="1"/>
    <circle cx="50" cy="150" r="1"/><circle cx="100" cy="150" r="1"/><circle cx="150" cy="150" r="1"/><circle cx="200" cy="150" r="1"/><circle cx="250" cy="150" r="1"/><circle cx="300" cy="150" r="1"/><circle cx="350" cy="150" r="1"/><circle cx="400" cy="150" r="1"/><circle cx="450" cy="150" r="1"/><circle cx="500" cy="150" r="1"/><circle cx="550" cy="150" r="1"/><circle cx="600" cy="150" r="1"/><circle cx="650" cy="150" r="1"/><circle cx="700" cy="150" r="1"/><circle cx="750" cy="150" r="1"/><circle cx="800" cy="150" r="1"/><circle cx="850" cy="150" r="1"/>
    <circle cx="50" cy="200" r="1"/><circle cx="100" cy="200" r="1"/><circle cx="150" cy="200" r="1"/><circle cx="200" cy="200" r="1"/><circle cx="250" cy="200" r="1"/><circle cx="300" cy="200" r="1"/><circle cx="350" cy="200" r="1"/><circle cx="400" cy="200" r="1"/><circle cx="450" cy="200" r="1"/><circle cx="500" cy="200" r="1"/><circle cx="550" cy="200" r="1"/><circle cx="600" cy="200" r="1"/><circle cx="650" cy="200" r="1"/><circle cx="700" cy="200" r="1"/><circle cx="750" cy="200" r="1"/><circle cx="800" cy="200" r="1"/><circle cx="850" cy="200" r="1"/>
    <circle cx="50" cy="250" r="1"/><circle cx="100" cy="250" r="1"/><circle cx="150" cy="250" r="1"/><circle cx="200" cy="250" r="1"/><circle cx="250" cy="250" r="1"/><circle cx="300" cy="250" r="1"/><circle cx="350" cy="250" r="1"/><circle cx="400" cy="250" r="1"/><circle cx="450" cy="250" r="1"/><circle cx="500" cy="250" r="1"/><circle cx="550" cy="250" r="1"/><circle cx="600" cy="250" r="1"/><circle cx="650" cy="250" r="1"/><circle cx="700" cy="250" r="1"/><circle cx="750" cy="250" r="1"/><circle cx="800" cy="250" r="1"/><circle cx="850" cy="250" r="1"/>
    <circle cx="50" cy="300" r="1"/><circle cx="100" cy="300" r="1"/><circle cx="150" cy="300" r="1"/><circle cx="200" cy="300" r="1"/><circle cx="250" cy="300" r="1"/><circle cx="300" cy="300" r="1"/><circle cx="350" cy="300" r="1"/><circle cx="400" cy="300" r="1"/><circle cx="450" cy="300" r="1"/><circle cx="500" cy="300" r="1"/><circle cx="550" cy="300" r="1"/><circle cx="600" cy="300" r="1"/><circle cx="650" cy="300" r="1"/><circle cx="700" cy="300" r="1"/><circle cx="750" cy="300" r="1"/><circle cx="800" cy="300" r="1"/><circle cx="850" cy="300" r="1"/>
    <circle cx="50" cy="350" r="1"/><circle cx="100" cy="350" r="1"/><circle cx="150" cy="350" r="1"/><circle cx="200" cy="350" r="1"/><circle cx="250" cy="350" r="1"/><circle cx="300" cy="350" r="1"/><circle cx="350" cy="350" r="1"/><circle cx="400" cy="350" r="1"/><circle cx="450" cy="350" r="1"/><circle cx="500" cy="350" r="1"/><circle cx="550" cy="350" r="1"/><circle cx="600" cy="350" r="1"/><circle cx="650" cy="350" r="1"/><circle cx="700" cy="350" r="1"/><circle cx="750" cy="350" r="1"/><circle cx="800" cy="350" r="1"/><circle cx="850" cy="350" r="1"/>
  </g>

  <!-- Question node (origin) -->
  <circle cx="100" cy="200" r="18" fill="#0d1117" stroke="#58a6ff" stroke-width="2" filter="url(#glowStrong)"/>
  <text x="100" y="205" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="bold">?</text>

  <!-- Branching paths - pruned (gray, dashed) -->
  <!-- Path 1: goes up, gets pruned -->
  <path d="M 118,200 C 180,200 200,80 280,80" stroke="#8b949e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.4"/>
  <circle cx="280" cy="80" r="8" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.4"/>
  <line x1="274" y1="74" x2="286" y2="86" stroke="#f85149" stroke-width="2" opacity="0.7"/>
  <line x1="286" y1="74" x2="274" y2="86" stroke="#f85149" stroke-width="2" opacity="0.7"/>

  <!-- Path 2: goes slightly up, gets pruned further -->
  <path d="M 118,200 C 200,200 220,140 320,130" stroke="#8b949e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.4"/>
  <circle cx="320" cy="130" r="8" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.4"/>
  <line x1="314" y1="124" x2="326" y2="136" stroke="#f85149" stroke-width="2" opacity="0.7"/>
  <line x1="326" y1="124" x2="314" y2="136" stroke="#f85149" stroke-width="2" opacity="0.7"/>

  <!-- Path 3: goes down, branches, one pruned one continues -->
  <path d="M 118,200 C 180,200 200,280 280,290" stroke="#8b949e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.4"/>
  <!-- Sub-branch pruned -->
  <path d="M 280,290 C 320,300 340,340 380,345" stroke="#8b949e" stroke-width="1.5" fill="none" stroke-dasharray="4,3" opacity="0.3"/>
  <circle cx="380" cy="345" r="6" fill="none" stroke="#8b949e" stroke-width="1" opacity="0.3"/>
  <line x1="375" y1="340" x2="385" y2="350" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  <line x1="385" y1="340" x2="375" y2="350" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  <!-- Sub-branch continues -->
  <path d="M 280,290 C 320,280 360,260 420,250" stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- Path 4: main path, goes through middle -->
  <path d="M 118,200 C 200,200 250,200 350,195" stroke="#58a6ff" stroke-width="2.5" fill="none" opacity="0.6"/>
  <!-- Branches again -->
  <path d="M 350,195 C 400,180 430,160 480,155" stroke="#8b949e" stroke-width="2" fill="none" stroke-dasharray="6,4" opacity="0.35"/>
  <circle cx="480" cy="155" r="7" fill="none" stroke="#8b949e" stroke-width="1.5" opacity="0.35"/>
  <line x1="475" y1="150" x2="485" y2="160" stroke="#f85149" stroke-width="1.5" opacity="0.6"/>
  <line x1="485" y1="150" x2="475" y2="160" stroke="#f85149" stroke-width="1.5" opacity="0.6"/>

  <!-- Converging paths -->
  <path d="M 350,195 C 400,200 440,220 500,215" stroke="#58a6ff" stroke-width="2.5" fill="none" opacity="0.7"/>
  <path d="M 420,250 C 460,240 480,225 500,215" stroke="#58a6ff" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Final convergence to answer -->
  <path d="M 500,215 C 540,212 560,210 590,208" stroke="#58a6ff" stroke-width="3" fill="none" filter="url(#glow)" opacity="0.9"/>

  <!-- Answer node -->
  <circle cx="610" cy="208" r="18" fill="#0d1117" stroke="#3fb950" stroke-width="2.5" filter="url(#glowStrong)"/>
  <text x="610" y="214" text-anchor="middle" fill="#3fb950" font-size="18" font-weight="bold">!</text>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" fill="#e6edf3" font-size="13" font-weight="600" letter-spacing="3" text-transform="uppercase">AGENTIC DATA SCIENCE</text>

  <!-- Subtitle -->
  <text x="450" y="385" text-anchor="middle" fill="#8b949e" font-size="12" font-style="italic">Your data deserves a dissertation defense, not a dashboard</text>

  <!-- Labels -->
  <text x="100" y="240" text-anchor="middle" fill="#8b949e" font-size="10">Question</text>
  <text x="610" y="248" text-anchor="middle" fill="#8b949e" font-size="10">Decision</text>

  <!-- Legend -->
  <line x1="700" y1="100" x2="740" y2="100" stroke="#58a6ff" stroke-width="2"/>
  <text x="748" y="104" fill="#8b949e" font-size="10">Explored</text>
  <line x1="700" y1="120" x2="740" y2="120" stroke="#8b949e" stroke-width="2" stroke-dasharray="6,4" opacity="0.5"/>
  <text x="748" y="124" fill="#8b949e" font-size="10">Pruned</text>
  <g transform="translate(715, 140)">
    <line x1="-5" y1="-5" x2="5" y2="5" stroke="#f85149" stroke-width="2" opacity="0.7"/>
    <line x1="5" y1="-5" x2="-5" y2="5" stroke="#f85149" stroke-width="2" opacity="0.7"/>
  </g>
  <text x="748" y="144" fill="#8b949e" font-size="10">Failed check</text>
</svg>
