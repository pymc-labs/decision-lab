<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowGreen">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowRed">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="580" fill="url(#bg)"/>

  <!-- Dot grid -->
  <g opacity="0.08">
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#e6edf3"/>
    </pattern>
    <rect width="960" height="580" fill="url(#dots)"/>
  </g>

  <!-- Title -->
  <text x="480" y="38" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="600" letter-spacing="3">THE GARDEN OF FORKING PATHS</text>
  <text x="480" y="58" text-anchor="middle" fill="#8b949e" font-size="11" font-style="italic">Every analytical workflow is a series of judgment calls</text>

  <!-- ==================== LEFT SIDE: Vanilla Agent ==================== -->
  <text x="240" y="90" text-anchor="middle" fill="#f85149" font-size="12" font-weight="600" letter-spacing="1">VANILLA AGENT</text>

  <!-- Starting node -->
  <circle cx="240" cy="130" r="18" fill="none" stroke="#58a6ff" stroke-width="2" filter="url(#glowBlue)"/>
  <text x="240" y="135" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="700">?</text>
  <text x="240" y="155" text-anchor="middle" fill="#8b949e" font-size="9">Dataset</text>

  <!-- Fork 1: Missing data — 3 branches, agent picks one -->
  <line x1="240" y1="148" x2="155" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="240" y1="148" x2="240" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="240" y1="148" x2="325" y2="200" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
  <text x="240" y="178" text-anchor="middle" fill="#484f58" font-size="8">Missing data?</text>

  <circle cx="155" cy="205" r="4" fill="#484f58" opacity="0.4"/>
  <circle cx="240" cy="205" r="4" fill="#484f58" opacity="0.4"/>
  <circle cx="325" cy="205" r="5" fill="#58a6ff" opacity="0.6"/>

  <!-- Fork 2: Priors -->
  <line x1="325" y1="210" x2="290" y2="255" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="325" y1="210" x2="360" y2="255" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
  <text x="330" y="240" text-anchor="middle" fill="#484f58" font-size="8">Priors?</text>

  <circle cx="290" cy="260" r="4" fill="#484f58" opacity="0.4"/>
  <circle cx="360" cy="260" r="5" fill="#58a6ff" opacity="0.6"/>

  <!-- Fork 3: Model -->
  <line x1="360" y1="265" x2="330" y2="310" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="360" y1="265" x2="390" y2="310" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
  <text x="368" y="295" text-anchor="middle" fill="#484f58" font-size="8">Model?</text>

  <circle cx="330" cy="315" r="4" fill="#484f58" opacity="0.4"/>
  <circle cx="390" cy="315" r="5" fill="#58a6ff" opacity="0.6"/>

  <!-- Fork 4: Diagnostics -->
  <line x1="390" y1="320" x2="360" y2="365" stroke="#58a6ff" stroke-width="1.5" opacity="0.3"/>
  <line x1="390" y1="320" x2="420" y2="365" stroke="#58a6ff" stroke-width="2" opacity="0.8"/>
  <text x="398" y="350" text-anchor="middle" fill="#484f58" font-size="8">Diagnostics?</text>

  <circle cx="360" cy="370" r="4" fill="#484f58" opacity="0.4"/>
  <circle cx="420" cy="370" r="5" fill="#58a6ff" opacity="0.6"/>

  <!-- Multiple "good looking" outcome nodes scattered — all wrong -->
  <line x1="420" y1="375" x2="300" y2="430" stroke="#f85149" stroke-width="1.5" opacity="0.6"/>

  <!-- The chosen result -->
  <circle cx="280" cy="448" r="20" fill="none" stroke="#3fb950" stroke-width="2" opacity="0.5"/>
  <text x="280" y="444" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="600" opacity="0.7">+30% TV</text>
  <text x="280" y="456" text-anchor="middle" fill="#3fb950" font-size="8" font-weight="600" opacity="0.7">+10% Radio</text>

  <!-- Ghost "also good" results the agent didn't even check -->
  <circle cx="170" cy="430" r="16" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <text x="170" y="433" text-anchor="middle" fill="#3fb950" font-size="7" opacity="0.35">-20% TV</text>

  <circle cx="210" cy="475" r="16" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <text x="210" y="478" text-anchor="middle" fill="#3fb950" font-size="7" opacity="0.35">+80% Search</text>

  <circle cx="340" cy="465" r="16" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <text x="340" y="468" text-anchor="middle" fill="#3fb950" font-size="7" opacity="0.35">All to TV</text>

  <circle cx="130" cy="470" r="16" fill="none" stroke="#3fb950" stroke-width="1" opacity="0.25" stroke-dasharray="3,3"/>
  <text x="130" y="473" text-anchor="middle" fill="#3fb950" font-size="7" opacity="0.35">+50% Social</text>

  <!-- Warning: all look good, all different -->
  <rect x="130" y="505" width="220" height="34" rx="5" fill="#f8514915" stroke="#f85149" stroke-width="0.7"/>
  <text x="240" y="519" text-anchor="middle" fill="#f85149" font-size="9" font-weight="600">Each run picks a different "good" answer</text>
  <text x="240" y="532" text-anchor="middle" fill="#f85149" font-size="8" opacity="0.8">All look plausible — which one is right?</text>

  <!-- ==================== DIVIDER ==================== -->
  <line x1="480" y1="80" x2="480" y2="545" stroke="#30363d" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="480" y="565" text-anchor="middle" fill="#484f58" font-size="9">Same dataset — different judgment</text>

  <!-- ==================== RIGHT SIDE: Decision Lab ==================== -->
  <text x="720" y="90" text-anchor="middle" fill="#3fb950" font-size="12" font-weight="600" letter-spacing="1">DECISION LAB</text>

  <!-- Starting node -->
  <circle cx="720" cy="130" r="18" fill="none" stroke="#58a6ff" stroke-width="2" filter="url(#glowBlue)"/>
  <text x="720" y="135" text-anchor="middle" fill="#58a6ff" font-size="16" font-weight="700">?</text>
  <text x="720" y="155" text-anchor="middle" fill="#8b949e" font-size="9">Dataset</text>

  <!-- Fork 1: Missing data — ALL 3 explored -->
  <line x1="720" y1="148" x2="620" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="720" y1="148" x2="720" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="720" y1="148" x2="820" y2="200" stroke="#58a6ff" stroke-width="1.5" opacity="0.7"/>
  <text x="720" y="178" text-anchor="middle" fill="#58a6ff" font-size="8">Missing data?</text>

  <circle cx="620" cy="205" r="5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="720" cy="205" r="5" fill="#58a6ff" opacity="0.6"/>
  <circle cx="820" cy="205" r="5" fill="#58a6ff" opacity="0.6"/>

  <!-- Left branch: both sub-paths explored, one pruned, one continues -->
  <line x1="620" y1="210" x2="595" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="620" y1="210" x2="645" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="595" cy="260" r="4" fill="#f85149" opacity="0.6"/>
  <circle cx="645" cy="260" r="4" fill="#3fb950" opacity="0.6"/>
  <text x="595" y="276" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>
  <text x="645" y="276" text-anchor="middle" fill="#3fb950" font-size="7">passed</text>

  <!-- Middle branch: explored, both pruned -->
  <line x1="720" y1="210" x2="695" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="720" y1="210" x2="745" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="695" cy="260" r="4" fill="#f85149" opacity="0.6"/>
  <circle cx="745" cy="260" r="4" fill="#f85149" opacity="0.6"/>
  <text x="695" y="276" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>
  <text x="745" y="276" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>

  <!-- Right branch: explored, one pruned, one continues -->
  <line x1="820" y1="210" x2="795" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <line x1="820" y1="210" x2="845" y2="255" stroke="#58a6ff" stroke-width="1.2" opacity="0.5"/>
  <circle cx="795" cy="260" r="4" fill="#3fb950" opacity="0.6"/>
  <circle cx="845" cy="260" r="4" fill="#f85149" opacity="0.6"/>
  <text x="795" y="276" text-anchor="middle" fill="#3fb950" font-size="7">passed</text>
  <text x="845" y="276" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>

  <!-- X marks on pruned -->
  <g opacity="0.5">
    <text x="595" y="286" text-anchor="middle" fill="#f85149" font-size="8">✗</text>
    <text x="695" y="286" text-anchor="middle" fill="#f85149" font-size="8">✗</text>
    <text x="745" y="286" text-anchor="middle" fill="#f85149" font-size="8">✗</text>
    <text x="845" y="286" text-anchor="middle" fill="#f85149" font-size="8">✗</text>
  </g>

  <!-- Surviving paths go deeper — model selection -->
  <line x1="645" y1="265" x2="625" y2="310" stroke="#3fb950" stroke-width="1.2" opacity="0.5"/>
  <line x1="645" y1="265" x2="665" y2="310" stroke="#3fb950" stroke-width="1.2" opacity="0.5"/>
  <circle cx="625" cy="315" r="4" fill="#f85149" opacity="0.5"/>
  <circle cx="665" cy="315" r="4" fill="#3fb950" opacity="0.7"/>
  <text x="625" y="330" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>
  <text x="665" y="330" text-anchor="middle" fill="#3fb950" font-size="7">converged</text>
  <text x="625" y="340" text-anchor="middle" fill="#f85149" font-size="8" opacity="0.5">✗</text>

  <line x1="795" y1="265" x2="775" y2="310" stroke="#3fb950" stroke-width="1.2" opacity="0.5"/>
  <line x1="795" y1="265" x2="815" y2="310" stroke="#3fb950" stroke-width="1.2" opacity="0.5"/>
  <circle cx="775" cy="315" r="4" fill="#3fb950" opacity="0.7"/>
  <circle cx="815" cy="315" r="4" fill="#f85149" opacity="0.5"/>
  <text x="775" y="330" text-anchor="middle" fill="#3fb950" font-size="7">converged</text>
  <text x="815" y="330" text-anchor="middle" fill="#f85149" font-size="7">pruned</text>
  <text x="815" y="340" text-anchor="middle" fill="#f85149" font-size="8" opacity="0.5">✗</text>

  <!-- Deeper: sensitivity analysis on converged paths -->
  <line x1="665" y1="320" x2="665" y2="365" stroke="#3fb950" stroke-width="1.2" opacity="0.6"/>
  <line x1="775" y1="320" x2="775" y2="365" stroke="#3fb950" stroke-width="1.2" opacity="0.6"/>
  <circle cx="665" cy="370" r="4" fill="#3fb950" opacity="0.8"/>
  <circle cx="775" cy="370" r="4" fill="#3fb950" opacity="0.8"/>
  <text x="665" y="386" text-anchor="middle" fill="#3fb950" font-size="7">robust</text>
  <text x="775" y="386" text-anchor="middle" fill="#3fb950" font-size="7">robust</text>

  <!-- Convergence: surviving paths agree -->
  <line x1="665" y1="378" x2="720" y2="415" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>
  <line x1="775" y1="378" x2="720" y2="415" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>

  <!-- Consensus box -->
  <rect x="645" y="410" width="150" height="36" rx="6" fill="#161b22" stroke="#3fb950" stroke-width="1.5"/>
  <text x="720" y="426" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600">2 of 3 paths converged</text>
  <text x="720" y="439" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="600">Results agree</text>

  <!-- Validated outcome node -->
  <line x1="720" y1="446" x2="720" y2="465" stroke="#3fb950" stroke-width="1.5"/>
  <circle cx="720" cy="488" r="22" fill="none" stroke="#3fb950" stroke-width="2" filter="url(#glowGreen)"/>
  <text x="720" y="484" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700">Validated</text>
  <text x="720" y="496" text-anchor="middle" fill="#3fb950" font-size="9" font-weight="700">decision</text>

  <text x="720" y="524" text-anchor="middle" fill="#3fb950" font-size="9" opacity="0.8">Tested, falsified, trusted</text>

  <!-- Label -->
  <rect x="645" y="535" width="150" height="20" rx="4" fill="#3fb95020" stroke="#3fb950" stroke-width="0.5"/>
  <text x="720" y="549" text-anchor="middle" fill="#3fb950" font-size="9">Bad paths pruned, good paths verified</text>

  <!-- ==================== LEGEND ==================== -->
  <g transform="translate(30, 520)">
    <circle cx="6" cy="0" r="4" fill="#3fb950" opacity="0.7"/>
    <text x="16" y="4" fill="#8b949e" font-size="9">Passed diagnostics</text>

    <circle cx="6" cy="16" r="4" fill="#f85149" opacity="0.6"/>
    <text x="16" y="20" fill="#8b949e" font-size="9">Pruned (failed checks)</text>

    <line x1="0" y1="32" x2="12" y2="32" stroke="#3fb950" stroke-width="1.5" opacity="0.7"/>
    <text x="16" y="36" fill="#8b949e" font-size="9">Converged path</text>
  </g>

</svg>