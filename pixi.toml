[workspace]
name = "decision-lab"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]

[dependencies]
python = "3.11.*"

# Core dlab runtime deps (mirrors pyproject.toml, minus internal dhub-cli)
httpx = ">=0.27"
pyyaml = ">=6.0"
rich = ">=13"

# textual, fastapi, uvicorn, modal are not on conda-forge with right versions
# → installed via pip feature below

[pypi-dependencies]
textual = ">=2.0"
fastapi = ">=0.100"
uvicorn = ">=0.20"
opentelemetry-sdk = ">=1.24"
opentelemetry-exporter-otlp-proto-http = ">=1.24"

[tasks]
# Run dlab directly from source — no install step needed.
# PYTHONPATH=. makes `import dlab` work without pip install.
dlab = { cmd = "python -m dlab.cli", env = { PYTHONPATH = "." } }
